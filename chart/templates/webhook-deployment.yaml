apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook
  namespace: {{ .Values.namespace }}
  labels:
    app: webhook-site
    {{- include "webhook-site.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.webhook.replicas }}
  selector:
    matchLabels:
      app: webhook-site
  template:
    metadata:
      labels:
        app: webhook-site
    spec:
      containers:
        - name: webhook-site
          image: "{{ .Values.webhook.image.repository }}:{{ .Values.webhook.image.tag }}"
          imagePullPolicy: {{ .Values.webhook.image.pullPolicy }}
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: APP_URL
              value: {{ include "webhook-site.appUrl" . | quote }}
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.webhook.existingSecret | default "webhook-site-secret" }}
                  key: APP_KEY
            {{- range $key, $val := .Values.webhook.env }}
            {{- if and (ne $key "APP_URL") (ne $key "APP_KEY") }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- end }}
          {{- with .Values.webhook.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      restartPolicy: Always
