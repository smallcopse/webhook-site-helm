{{- if not .Values.webhook.existingSecret }}
{{- $secretName := "webhook-site-secret" }}
{{- $appKey := .Values.webhook.env.APP_KEY }}
{{- if not $appKey }}
{{- $existing := lookup "v1" "Secret" .Values.namespace $secretName }}
{{- if and $existing $existing.data (index $existing.data "APP_KEY") }}
{{- $appKey = index $existing.data "APP_KEY" | b64dec }}
{{- else }}
{{- $appKey = printf "base64:%s" (randBytes 32 | b64enc) }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: webhook-site
    {{- include "webhook-site.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_KEY: {{ $appKey | quote }}
{{- end }}
