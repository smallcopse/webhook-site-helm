## Global settings
namespace: webhook-site

## webhook.site (Laravel app) settings
webhook:
  image:
    repository: webhooksite/webhook.site
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 8084
    targetPort: 80
  env:
    APP_ENV: production
    APP_DEBUG: "false"
    ## Set a 32-character random string. Generate with: php artisan key:generate --show
    APP_KEY: ""
    DB_CONNECTION: sqlite
    BROADCAST_DRIVER: redis
    CACHE_DRIVER: redis
    QUEUE_DRIVER: redis
    REDIS_HOST: redis
    REDIS_PORT: "6379"
  resources: {}
  #  requests:
  #    cpu: 100m
  #    memory: 128Mi
  #  limits:
  #    cpu: 500m
  #    memory: 512Mi

## Laravel Echo Server settings
echoServer:
  image:
    repository: webhooksite/laravel-echo-server
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 6001
  env:
    ECHO_ALLOW_CORS: "true"
    ECHO_ALLOW_ORIGIN: "*"
    ECHO_ALLOW_METHODS: "*"
    ECHO_REDIS_HOSTNAME: redis
    ECHO_REDIS_PORT: "6379"
    ECHO_SERVER_HOST: "0.0.0.0"
    ECHO_SERVER_PORT: "6001"
    ECHO_PROTOCOL: http
    ## Points to the webhook service; override if using a custom service name
    ECHO_AUTH_HOST: http://webhook:8084
  resources: {}

## Redis settings
redis:
  image:
    repository: redis
    tag: alpine
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 6379
  resources: {}

## OpenShift Route settings (replaces Ingress)
route:
  ## Hostname for the Route (e.g. webhook.apps.mycluster.example.com)
  ## Leave empty to let OpenShift auto-assign
  host: ""
  ## TLS termination: edge | reencrypt | passthrough | "" (no TLS)
  tls:
    enabled: false
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
